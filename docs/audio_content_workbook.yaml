version: 1
project: oracle_orb
usage: >
  Working file for content creation.
  Edit this file when preparing phrases, folders and sequence behavior.
  Keep paths and sequence names synced with audio_content_spec.yaml.

owners:
  content: ""
  voice: ""
  qa: ""

folders:
  hybrid:
    service:
      start: /sdcard/audio/hybrid/start
      local_fail_fallback: /sdcard/audio/hybrid/fail
    oracle_template: /sdcard/audio/oracle/{phase}/{domain}
    domains:
      - love
      - money
      - path
      - danger
      - future
      - inner_state
      - wish
      - choice
      - past
      - timing
      - place
      - uncertain
    phases:
      - greeting
      - understanding
      - prediction
      - farewell
  offline:
    aura_intro: /sdcard/audio/aura/intro
    aura_response: /sdcard/audio/aura/response
    grumble: /sdcard/audio/grumble
    lottery_sorting: /sdcard/audio/lottery/sorting
    lottery_team1: /sdcard/audio/lottery/team1
    lottery_team2: /sdcard/audio/lottery/team2
    lottery_team3: /sdcard/audio/lottery/team3
    lottery_team4: /sdcard/audio/lottery/team4
    lottery_finished: /sdcard/audio/lottery/finished.mp3
  shared:
    backgrounds: /sdcard/audio/background

sequences:
  hybrid_main:
    steps:
      - hold_touch_5s
      - play_service_start
      - capture_mic_5s
      - send_remote_asr_tts_request
      - first_chunk_timeout_10s_then_local_fail
      - wait_remote_tts_stream
      - fade_to_idle
      - on_stream_max_90s: fade_to_idle
    oracle_timing_ms:
      gap_1_to_2: 800
      gap_2_to_3: 800
      gap_3_to_4: 2000
      bg_fade_in: 2000
      bg_fade_out: 4000
  aura_main:
    steps:
      - hold_touch_5s
      - play_intro_random
      - wait_gap
      - play_color_phrase_by_selected_color
      - wait_5s
      - fade_to_idle
    configurable:
      - hold_ms
      - phase_gap_ms
      - fade_out_ms

text_bank:
  hybrid_service:
    start:
      description: Invite user to ask a question.
      variants:
        - text: ""
          file: ""
        - text: ""
          file: ""

  oracle_templates:
    greeting:
      template: ""
    understanding:
      template: ""
    prediction:
      template: ""
    farewell:
      template: ""

target_counts:
  hybrid_service:
    start: 8
    local_fail_fallback: 4
  oracle:
    default_target_per_phase_per_domain: 12
    minimum_per_phase_per_domain: 6
    overrides:
      timing:
        greeting: 10
        understanding: 12
        prediction: 14
        farewell: 8
      yes_no:
        greeting: 8
        understanding: 10
        prediction: 12
        farewell: 8
  offline:
    aura:
      intro: 10
      response_generic: 12
      response_per_color: 1
    grumble: 16
    lottery:
      sorting: 10
      team1: 8
      team2: 8
      team3: 8
      team4: 8
      finished: 3
  shared:
    backgrounds: 4

production_checklist:
  - normalize_all_mp3_to_same_sample_rate: false
  - loudness_checked_lufs_range_minus18_to_minus14: false
  - no_clip_in_peaks: false
  - filenames_match_folder_intent_phase: false
  - no_duplicate_phrases_in_same_session_pool: false
  - fallback_simulation_tested_when_folder_missing: false

notes: []
